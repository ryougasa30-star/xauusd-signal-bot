services:
  - type: worker
    name: xauusd-signal-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SIGNAL_INTERVAL_MINUTES
        value: 30
      - key: SIMULATED
        value: false
      - key: WEBHOOK_SECRET
        value: ""
